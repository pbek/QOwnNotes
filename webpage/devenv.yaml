# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  shared:
    url: github:pbek/nix-shared
    flake: false

imports:
  - shared/common
  - shared/javascript
  - shared/playwright
