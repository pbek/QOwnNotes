name: qownnotes
version: "VERSION-STRING"
summary: Plain-text file markdown note taking with Nextcloud/ownCloud integration
grade: stable
confinement: strict
base: core24
description: |
  QOwnNotes is the open source (GPL) plain-text file markdown note taking app
  for GNU/Linux, macOS and Windows, that (optionally) works together with the
  notes application of Nextcloud/ownCloud.
  https://www.qownnotes.org/

# Expose libraries installed into non-standard sub-directories so the
# dynamic linker can find them at runtime. libproxy on Noble puts its
# backend plugin into /usr/lib/<triplet>/libproxy/ which is not on the
# default LD_LIBRARY_PATH set by the desktop-launch wrapper.
layout:
  /usr/lib/x86_64-linux-gnu/libproxy:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/libproxy

apps:
  qownnotes:
    # The desktop helper still configures Qt4/Qt5 plugin locations, so run a
    # small wrapper after it to point Qt6 at the staged plugin and QML paths.
    command: bin/desktop-launch $SNAP/wrapper.sh
    environment:
      DISABLE_WAYLAND: 1
      QT_QPA_PLATFORMTHEME: gtk3
      QT_STYLE_OVERRIDE: Breeze
      GIT_EXEC_PATH: $SNAP/usr/lib/git-core
      GIT_TEMPLATE_DIR: $SNAP/usr/share/git-core/templates
      GIT_AUTHOR_NAME: "QOwnNotes"
      GIT_AUTHOR_EMAIL: "snap@qownnotes.git"
      GIT_COMMITTER_NAME: "QOwnNotes"
      GIT_COMMITTER_EMAIL: "snap@qownnotes.git"
      EMAIL: "snap@qownnotes.git"
    plugs:
      - x11
      - unity7
      - network
      - network-bind
      - home
      - desktop
      - desktop-legacy
      - removable-media
      - opengl
      - cups-control

plugs:
  gtk-3-themes:
    interface: content
    target: $SNAP/data-dir/themes
    default-provider: gtk-common-themes:gtk-3-themes
  icon-themes:
    interface: content
    target: $SNAP/data-dir/icons
    default-provider: gtk-common-themes:icon-themes
  sound-themes:
    interface: content
    target: $SNAP/data-dir/sounds
    default-provider: gtk-common-themes:sounds-themes

parts:
  qownnotes:
    source: https://github.com/pbek/QOwnNotes/releases/download/vVERSION-STRING/qownnotes-VERSION-STRING.tar.xz
    source-checksum: sha256/ARCHIVE-SHA256
    # Use make plugin and call qmake6 manually because the qmake plugin does not
    # reliably pick the Qt6 toolchain in the Launchpad build environment.
    plugin: make
    override-build: |
      export QT_SELECT=qt6
      # Remove the default desktop file.
      rm PBE.QOwnNotes.desktop
      echo "#define RELEASE \"Launchpad Snap\"" > release.h
      /usr/lib/qt6/bin/lrelease languages/*.ts
      qmake6 CONFIG+=release CONFIG+=snapcraft QOwnNotes.pro
      craftctl default
      make install INSTALL_ROOT="${CRAFT_PART_INSTALL}"
    build-packages:
      - build-essential
      - qmake6
      - qt6-base-dev
      - qt6-declarative-dev
      - libqt6svg6-dev
      - libqt6websockets6-dev
      - libqt6core5compat6-dev
      - libsecret-1-dev
      - qt6-l10n-tools
      - qt6-tools-dev-tools
    stage-packages:
      - libqt6core6t64
      - libqt6gui6t64
      - libqt6widgets6t64
      - libqt6network6t64
      - libqt6sql6t64
      - libqt6sql6-sqlite
      - libqt6xml6t64
      - libqt6dbus6t64
      - libqt6concurrent6t64
      - libqt6printsupport6t64
      - libqt6svg6
      - libqt6svgwidgets6
      - libqt6websockets6
      - libqt6core5compat6
      - libqt6qml6
      - libqt6qmlmodels6
      - libqt6qmlworkerscript6
      - libqt6quick6
      - libqt6opengl6t64
      - libsecret-1-0
      - libproxy1v5
      - qt6-wayland
      - git-core
    stage:
      - -usr/share/pkgconfig
    override-prime: |
      craftctl default
      arch_triplet="$(dpkg-architecture -q DEB_HOST_MULTIARCH)"
      platform_dir="${CRAFT_PRIME}/usr/lib/${arch_triplet}/qt6/plugins/platforms"
      test -f "${platform_dir}/libqxcb.so"
      test -f "${platform_dir}/libqwayland-egl.so"
      test -f "${platform_dir}/libqwayland-generic.so"
    after: [desktop-qt6]

  desktop-qt6:
    source: https://github.com/ubuntu/snapcraft-desktop-helpers.git
    source-subdir: qt
    plugin: make
    make-parameters: ["FLAVOR=qt6"]
    build-packages:
      - build-essential
      - qt6-base-dev
      - dpkg-dev
    stage-packages:
      - libxcb-cursor0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-shm0
      - libxcb-sync1
      - libxcb-util1
      - libxcb-xfixes0
      - libxcb-xinerama0
      - libxcb-xkb1
      - libxkbcommon0
      - libxkbcommon-x11-0
      - fonts-ubuntu
      - dmz-cursor-theme
      - light-themes
      - adwaita-icon-theme
      - gnome-themes-extra
      - shared-mime-info
      - libqt6gui6t64
      - libgdk-pixbuf2.0-0
      - libqt6svg6
      - locales-all
      - xdg-user-dirs

  plasma-integration:
    plugin: nil
    stage-packages:
      - kde-style-breeze
      - breeze-icon-theme
    prime:
      - "-usr/share/wallpapers/*"
      - "-usr/share/fonts/*"

  qt6-gtk-platform:
    plugin: nil
    stage-packages:
      - qt6-gtk-platformtheme

  scripts:
    plugin: dump
    source: snap/local
    stage:
      - wrapper.sh
