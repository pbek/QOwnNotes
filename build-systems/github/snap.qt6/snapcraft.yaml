name: qownnotes
adopt-info: qownnotes
summary: Plain-text file markdown note taking with Nextcloud/ownCloud integration
grade: stable
confinement: strict
base: core24
description: |
  QOwnNotes is the open source (GPL) plain-text file markdown note taking app
  for GNU/Linux, macOS and Windows, that (optionally) works together with the
  notes application of Nextcloud/ownCloud.
  https://www.qownnotes.org/

# Expose libraries installed into non-standard sub-directories so the
# dynamic linker can find them at runtime.  libproxy on Noble puts its
# backend plugin into /usr/lib/<triplet>/libproxy/ which is NOT on the
# default LD_LIBRARY_PATH set by the desktop-launch wrapper.
layout:
  /usr/lib/x86_64-linux-gnu/libproxy:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/libproxy

apps:
  qownnotes:
    # The desktop helper still configures Qt4/Qt5 plugin locations, so run a
    # small wrapper after it to point Qt6 at the staged plugin and QML paths.
    command: bin/desktop-launch $SNAP/wrapper.sh
    environment:
      DISABLE_WAYLAND: 1
      QT_QPA_PLATFORMTHEME: gtk3
      QT_STYLE_OVERRIDE: Breeze
    # see https://docs.snapcraft.io/reference/interfaces
    plugs:
      - x11
      - unity7
      - network
      - network-bind
      - home
      - desktop
      - desktop-legacy
      - removable-media
      - opengl
      - cups-control

plugs: # plugs for theming, font settings, cursor and to use gtk3 file chooser
  gtk-3-themes:
    interface: content
    target: $SNAP/data-dir/themes
    default-provider: gtk-common-themes:gtk-3-themes
  icon-themes:
    interface: content
    target: $SNAP/data-dir/icons
    default-provider: gtk-common-themes:icon-themes
  sound-themes:
    interface: content
    target: $SNAP/data-dir/sounds
    default-provider: gtk-common-themes:sounds-themes

parts:
  qownnotes:
    source: https://github.com/pbek/qownnotes.git
    # Use make plugin and call qmake6 manually (the qmake plugin does not
    # support Qt6 properly and invokes the system Qt5 qmake instead)
    plugin: make
    override-build: |
      export QT_SELECT=qt6
      >&2 pwd
      >&2 find
      # Remove the default desktop file
      rm ../src/src/PBE.QOwnNotes.desktop
      echo "#define RELEASE \"Snapcraft.io\"" > release.h
      /usr/lib/qt6/bin/lrelease ../src/src/languages/*.ts
      qmake6 CONFIG+=release CONFIG+=snapcraft ../src/src/QOwnNotes.pro
      craftctl set version="$(cat ../src/src/version.h | sed 's/[^0-9,.]//g')"
      craftctl default
      make install INSTALL_ROOT="${CRAFT_PART_INSTALL}"
    build-packages:
      - build-essential
      - qmake6
      - qt6-base-dev
      - qt6-declarative-dev
      - libqt6svg6-dev
      - libqt6websockets6-dev
      - libqt6core5compat6-dev
      - libsecret-1-dev
      - qt6-l10n-tools
      - qt6-tools-dev-tools
    stage-packages:
      # -- Qt6 core runtime libraries --
      - libqt6core6t64
      - libqt6gui6t64
      - libqt6widgets6t64
      - libqt6network6t64
      - libqt6sql6t64
      - libqt6sql6-sqlite
      - libqt6xml6t64
      - libqt6dbus6t64
      - libqt6concurrent6t64
      - libqt6printsupport6t64
      - libqt6svg6
      - libqt6svgwidgets6
      - libqt6websockets6
      - libqt6core5compat6
      # -- Qt6 QML / Quick (needed for the scripting engine) --
      - libqt6qml6
      - libqt6qmlmodels6
      - libqt6qmlworkerscript6
      - libqt6quick6
      # -- Qt6 OpenGL (required by libqt6quick6) --
      - libqt6opengl6t64
      # -- Secret Service keychain backend --
      - libsecret-1-0
      # -- Proxy support (libqt6network6t64 links to libproxy) --
      # libproxy1v5 ships libpxbackend-1.0.so in a private sub-directory;
      # the layout section above makes that path visible to the linker.
      - libproxy1v5
      # Bundle the Wayland QPA plugins explicitly; libqt6gui6t64 ships xcb,
      # but the Wayland backend lives in a separate package on Ubuntu 24.04.
      - qt6-wayland
    stage:
      - -usr/share/pkgconfig
    override-prime: |
      craftctl default
      arch_triplet="$(dpkg-architecture -q DEB_HOST_MULTIARCH)"
      platform_dir="${CRAFT_PRIME}/usr/lib/${arch_triplet}/qt6/plugins/platforms"
      test -f "${platform_dir}/libqxcb.so"
      test -f "${platform_dir}/libqwayland-egl.so"
      test -f "${platform_dir}/libqwayland-generic.so"
    after: [desktop-qt6]

  desktop-qt6:
    source: https://github.com/ubuntu/snapcraft-desktop-helpers.git
    source-subdir: qt
    plugin: make
    make-parameters: ["FLAVOR=qt6"]
    build-packages:
      - build-essential
      - qt6-base-dev
      - dpkg-dev
    stage-packages:
      # Qt's xcb platform plugin depends on a set of xcb helper libraries that
      # are not reliably pulled in by the desktop helper on core24.
      - libxcb-cursor0
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      - libxcb-shape0
      - libxcb-shm0
      - libxcb-sync1
      - libxcb-util1
      - libxcb-xfixes0
      - libxcb-xinerama0
      - libxcb-xkb1
      - libxkbcommon0
      - libxkbcommon-x11-0
      - fonts-ubuntu
      - dmz-cursor-theme
      - light-themes
      - adwaita-icon-theme
      - gnome-themes-extra
      - shared-mime-info
      - libqt6gui6t64
      - libgdk-pixbuf2.0-0
      - libqt6svg6 # for loading icon themes which are svg
      - locales-all
      - xdg-user-dirs

  plasma-integration:
    plugin: nil
    stage-packages:
      #    - plasma-integration # causes the KDE file selector to be used that didn't work
      - kde-style-breeze
      - breeze-icon-theme
    #    - kio # runtime slaves for kio, but does not seem to work
    prime:
      - "-usr/share/wallpapers/*"
      - "-usr/share/fonts/*"

  qt6-gtk-platform:
    plugin: nil
    stage-packages:
      - qt6-gtk-platformtheme

  scripts:
    plugin: dump
    source: snap/local
    stage:
      - wrapper.sh
